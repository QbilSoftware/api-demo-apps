name: CI media cleanup

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete per-PR media release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Removes the ci-media-pr-<N> prerelease and its tag when the PR
        # closes. `|| true` because most PRs never produced a media release.
        run: >
          gh release delete "ci-media-pr-${{ github.event.pull_request.number }}"
          --repo "$GITHUB_REPOSITORY" --cleanup-tag -y || true
