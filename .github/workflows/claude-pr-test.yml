name: Claude PR Test

on:
  pull_request:
    types: [labeled, synchronize]
    paths:
      - src/**
      - templates/**
      - config/**
      - assets/**
      - migrations/**
      - public/**
      - e2e/**
      - .claude/skills/test-review/**
      - .github/workflows/claude-pr-test.yml
      - .github/actions/setup-app-server/**

concurrency:
  group: claude-pr-test-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    name: Claude test-review on PR
    if: >-
      github.event.pull_request.draft == false
      && (
        (github.event.action == 'labeled' && github.event.label.name == 'test')
        || (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'test'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      RUN_ID: ${{ github.run_id }}

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
          show-progress: false

      - name: Setup App Server
        uses: ./.github/actions/setup-app-server
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Playwright system deps
        # The Playwright bundle handles the browser binary itself, but the
        # OS-level deps (libnss3, libatk, etc.) still need installing.
        run: npx --yes playwright install-deps chromium
      - name: Install chrome-for-testing for @playwright/mcp
        # @playwright/mcp uses Google's chrome-for-testing build (not the
        # vanilla `playwright install chromium` binary) and ships its own
        # installer to fetch it. The error message in the previous run
        # literally tells us this command — it's the canonical one.
        run: npx --yes @playwright/mcp@latest install-browser chrome-for-testing

      - name: Write PR diff for the skill
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh pr diff "${PR_NUMBER}" --repo "${GITHUB_REPOSITORY}" > /tmp/pr-diff.txt
          gh pr diff "${PR_NUMBER}" --repo "${GITHUB_REPOSITORY}" --name-only > /tmp/pr-changed-files.txt
          if [ ! -s /tmp/pr-changed-files.txt ]; then
            echo "Empty diff — gh pr diff produced no output. Aborting."
            exit 1
          fi
          echo "Changed files:"
          cat /tmp/pr-changed-files.txt

      - name: Write Playwright MCP config and Claude settings
        env:
          PW_OUTPUT_DIR: ${{ github.workspace }}/pw-output
        run: |
          mkdir -p "${PW_OUTPUT_DIR}"

          # MCP server config — consumed by `--mcp-config` flag
          cat > /tmp/mcp-playwright.json <<JSON
          {
            "mcpServers": {
              "playwright": {
                "command": "npx",
                "args": [
                  "-y", "@playwright/mcp@latest",
                  "--headless",
                  "--browser", "chromium",
                  "--caps", "devtools",
                  "--isolated",
                  "--viewport-size", "1920x1080",
                  "--output-dir", "${PW_OUTPUT_DIR}",
                  "--save-session"
                ]
              }
            }
          }
          JSON

          # Claude Code settings — consumed by the action's `settings:` input.
          # Using a structured JSON file avoids the shell-tokenisation pitfalls
          # of passing `--allowed-tools "Bash(foo bar)"` through claude_args.
          cat > /tmp/claude-settings.json <<'JSON'
          {
            "permissions": {
              "allow": [
                "Read",
                "Glob",
                "Grep",
                "Skill",
                "Bash(git diff*)",
                "Bash(git log*)",
                "Bash(cat*)",
                "Bash(echo*)",
                "Bash(tee*)",
                "Bash(mkdir*)",
                "Bash(ls*)",
                "Bash(find*)",
                "mcp__playwright__browser_navigate",
                "mcp__playwright__browser_take_screenshot",
                "mcp__playwright__browser_click",
                "mcp__playwright__browser_type",
                "mcp__playwright__browser_fill_form",
                "mcp__playwright__browser_select_option",
                "mcp__playwright__browser_snapshot",
                "mcp__playwright__browser_wait_for",
                "mcp__playwright__browser_hover",
                "mcp__playwright__browser_press_key",
                "mcp__playwright__browser_evaluate",
                "mcp__playwright__browser_console_messages",
                "mcp__playwright__browser_network_requests",
                "mcp__playwright__browser_mouse_click_xy",
                "mcp__playwright__browser_close",
                "mcp__playwright__browser_start_video",
                "mcp__playwright__browser_stop_video",
                "mcp__playwright__browser_start_tracing",
                "mcp__playwright__browser_stop_tracing"
              ]
            }
          }
          JSON

      - name: Run Claude test-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          settings: /tmp/claude-settings.json
          claude_args: --mcp-config /tmp/mcp-playwright.json --debug
          show_full_output: true
          prompt: |
            You are running a QA review of a PR in CI. Execute this exact
            sequence (the recording tools must be called by YOU at the top
            level — not delegated to the skill, because the skill's own
            allowed-tools list does not include them):

            1. Call `mcp__playwright__browser_navigate` once with
               `url: "http://localhost:8080/"` to warm up the browser
               context. Then call `mcp__playwright__browser_start_video` with
               no arguments to start recording.

            2. Invoke the `test-review` skill via the Skill tool. The skill
               is at `.claude/skills/test-review/SKILL.md`. It will detect CI
               mode from the `BASE_URL` env var (already set to
               `http://localhost:8080`) and read the diff from
               `/tmp/pr-diff.txt` + `/tmp/pr-changed-files.txt`. The skill
               will drive the browser, take screenshots with zero-padded
               filenames (`01-...png`, `02-...png`, ...), and write its
               report to `/tmp/test-review-report.md` using bash echo/tee.

            3. After the skill returns (regardless of pass/fail), call
               `mcp__playwright__browser_stop_video` to finalize the .webm,
               then `mcp__playwright__browser_close` to release the browser.
               Do this even if the skill reported failures — the recording
               is the most diagnostic artifact.

            If any of the MCP tool calls return "permission not granted",
            stop immediately and write a one-line note to
            `/tmp/test-review-report.md` saying which tool was denied —
            that's the bug the workflow needs to fix.
        env:
          BASE_URL: http://localhost:8080
          AWS_ACCESS_KEY_ID: x
          AWS_SECRET_ACCESS_KEY: x
          AWS_DEFAULT_REGION: eu-central-1

      - name: Rename Playwright recording for the artifact bundle
        if: always()
        run: |
          set -uo pipefail
          WEBM=$(find pw-output -name '*.webm' 2>/dev/null | head -1 || true)
          if [ -n "${WEBM}" ] && [ "${WEBM}" != "pw-output/session.webm" ]; then
            mv "${WEBM}" pw-output/session.webm
            echo "Renamed ${WEBM} -> pw-output/session.webm"
          fi

      - name: Upload artifacts
        if: always()
        id: upload_artifacts
        uses: actions/upload-artifact@v4
        with:
          name: claude-pr-test-${{ env.PR_NUMBER }}-${{ env.RUN_ID }}
          path: |
            pw-output/
            /tmp/test-review-report.md
            /tmp/pr-diff.txt
            /tmp/pr-changed-files.txt
            e2e/logs/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload screenshots & recording to user-attachments
        if: always()
        id: upload_media
        env:
          # GITHUB_TOKEN sometimes works for this endpoint; if it 401s, swap
          # to a PAT stored in a secret named UPLOAD_TOKEN and reference it
          # here instead. The endpoint is the undocumented one GitHub's web
          # UI uses when you drag-drop a file into a comment box — output
          # URLs at github.com/user-attachments/assets/<uuid> get auto-
          # embedded as <img> / <video> by GitHub's renderer.
          GH_TOKEN: ${{ secrets.UPLOAD_TOKEN || secrets.GITHUB_TOKEN }}
          REPO_ID: ${{ github.event.repository.id }}
        run: |
          set -uo pipefail
          : > /tmp/media-urls.txt

          upload_one() {
            local file="$1" ctype="$2"
            local name size policy upload_url asset_url
            name=$(basename "$file")
            size=$(stat -c%s "$file")
            echo "→ ${name} (${size} bytes, ${ctype})"

            policy=$(curl -sS -X POST \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/json" \
              -H "Content-Type: application/json" \
              -H "GitHub-Verified-Fetch: true" \
              -d "{\"name\":\"${name}\",\"size\":${size},\"content_type\":\"${ctype}\",\"repository_id\":${REPO_ID}}" \
              https://github.com/upload/policies/assets) || {
                echo "::warning::policy request failed for ${name}"
                return 1
              }
            upload_url=$(echo "$policy" | jq -r '.upload_url // empty')
            asset_url=$(echo "$policy" | jq -r '.asset.href // empty')
            if [ -z "$upload_url" ] || [ -z "$asset_url" ]; then
              echo "::warning::bad policy response for ${name}:"
              echo "$policy" | head -c 500
              echo
              return 1
            fi

            local -a form_args=()
            while IFS=$'\t' read -r k v; do
              form_args+=(-F "${k}=${v}")
            done < <(echo "$policy" | jq -r '.form | to_entries[] | "\(.key)\t\(.value)"')
            form_args+=(-F "file=@${file}")

            if ! curl -sSf -X POST "$upload_url" "${form_args[@]}" > /dev/null; then
              echo "::warning::S3 upload failed for ${name}"
              return 1
            fi

            echo "${name}=${asset_url}" >> /tmp/media-urls.txt
            echo "  ✓ ${asset_url}"
          }

          # `Rename Playwright recording` step already hoisted any nested
          # .webm to pw-output/session.webm before this step runs.

          while IFS= read -r -d '' f; do
            upload_one "$f" "image/png" || true
          done < <(find pw-output -type f -name '*.png' -print0 2>/dev/null)

          if [ -f pw-output/session.webm ]; then
            upload_one pw-output/session.webm "video/webm" || true
          fi

          echo
          echo "Mapping (/tmp/media-urls.txt):"
          if [ -s /tmp/media-urls.txt ]; then
            cat /tmp/media-urls.txt
          else
            echo "  (empty — every upload failed; the comment will fall back to bold captions)"
          fi

      - name: Post / update PR comment
        if: always()
        uses: actions/github-script@v7
        env:
          ARTIFACT_URL: ${{ steps.upload_artifacts.outputs.artifact-url }}
        with:
          script: |
            const fs = require('fs');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const runId = process.env.RUN_ID;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${runId}`;
            const artifactUrl = process.env.ARTIFACT_URL || '';

            if (!Number.isFinite(prNumber)) {
              core.setFailed(`PR_NUMBER env var is invalid: "${process.env.PR_NUMBER}"`);
              return;
            }

            const reportPath = '/tmp/test-review-report.md';
            let report = fs.existsSync(reportPath)
              ? fs.readFileSync(reportPath, 'utf8').trim()
              : '_No report produced — see workflow logs._';

            // Load filename → user-attachments URL mapping written by the
            // upload step. Each line is "name=url". Missing file = upload
            // failed for that asset; the linkifier degrades to bold-only.
            const mediaMapPath = '/tmp/media-urls.txt';
            const mediaMap = new Map();
            if (fs.existsSync(mediaMapPath)) {
              for (const line of fs.readFileSync(mediaMapPath, 'utf8').split('\n')) {
                const eq = line.indexOf('=');
                if (eq > 0) mediaMap.set(line.slice(0, eq), line.slice(eq + 1));
              }
            }
            core.info(`Loaded ${mediaMap.size} media URL(s)`);

            const stripQuery = (p) => p.split(/[?#]/)[0];
            const flatten = (p) => stripQuery(p).split('/').pop();
            const linkify = (caption, file) => {
              const name = flatten(file);
              const url = mediaMap.get(name);
              const text = (caption || name).trim();
              if (!text) return '';
              if (!url) return `**${text}**`;
              return `[${text}](${url})`;
            };

            // Rewrite markdown links/images that point at relative media.
            report = report.replace(
              /!?\[((?:\\.|[^\]])*)\]\(((?!https?:|data:)[^)\s]+?\.(?:png|jpg|jpeg|gif|webp|webm|mp4))(?:\s+"[^"]*")?\)/gi,
              (_, alt, file) => linkify(alt, file)
            );
            // Rewrite <img src="relative.png"> tags the same way.
            report = report.replace(
              /<img\b[^>]*?\bsrc=(["'])((?!https?:|data:)[^"']+?\.(?:png|jpg|jpeg|gif|webp))\1[^>]*?(?:\balt=(["'])([^"']*)\3)?[^>]*>/gi,
              (_, _q, file, __q, alt) => linkify(alt, file)
            );

            // Auto-embed the session video: GitHub's renderer turns a
            // markdown link to a user-attachments asset with a video file
            // extension into a real <video controls> player.
            const videoUrl = mediaMap.get('session.webm');
            const videoEmbed = videoUrl
              ? `\n\n### 📹 Session recording\n\n[session.webm](${videoUrl})\n`
              : '';

            const marker = '<!-- claude-pr-test-comment -->';
            const header = `### 🔍 Test Review — pr-${prNumber} · run #${runId}`;
            const footerParts = [`[Workflow run](${runUrl})`];
            if (artifactUrl) {
              footerParts.unshift(`📦 [Artifact bundle](${artifactUrl})`);
            }
            const footer = `---\n${footerParts.join(' · ')}`;
            // GitHub comment hard-limit is 65,536 chars. Stay under with headroom.
            const MAX_BODY = 60000;
            const overhead = `${marker}\n${header}\n\n\n${videoEmbed}\n\n${footer}`.length;
            const truncationNote = '\n\n_…report truncated — see the artifact for the full version._';
            let safeReport = report;
            if (overhead + safeReport.length > MAX_BODY) {
              const allowed = MAX_BODY - overhead - truncationNote.length;
              safeReport = safeReport.slice(0, Math.max(0, allowed)) + truncationNote;
            }

            const body = [marker, header, '', safeReport, videoEmbed, '', footer].join('\n');

            // Paginate listComments — default page size is 30; long-running PRs exceed it.
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: prNumber, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber, body,
              });
            }
